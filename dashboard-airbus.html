<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard AIRBUS — Logistique Toulouse</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root {
  --bg: #f0f2f5;
  --dark: #0f1623;
  --panel: #ffffff;
  --panel2: #f8f9fb;
  --border: #e4e8ef;
  --blue: #1a56ff;
  --blue-l: #e8edff;
  --green: #00c48c;
  --green-l: #e0faf3;
  --orange: #ff8c00;
  --orange-l: #fff3e0;
  --red: #ff3b5c;
  --red-l: #ffe8ec;
  --purple: #7c3aed;
  --purple-l: #ede9fe;
  --yellow: #eab308;
  --yellow-l: #fefce8;
  --muted: #8896ab;
  --text: #1a2333;
  --font: 'Barlow', sans-serif;
  --font-c: 'Barlow Condensed', sans-serif;
  --font-d: 'Bebas Neue', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; }

.topbar {
  background: var(--dark); color: white;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; height: 56px; position: sticky; top: 0; z-index: 200;
}
.brand { font-family: var(--font-d); font-size: 1.7rem; letter-spacing: 2px; }
.brand em { color: var(--blue); font-style: normal; }
.clock { font-family: var(--font-d); font-size: 1.5rem; letter-spacing: 3px; color: var(--blue); }
.live { display:flex;align-items:center;gap:6px;font-size:.7rem;color:rgba(255,255,255,.4);letter-spacing:1px;text-transform:uppercase; }
.live::before { content:'';width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 2s infinite; }

@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.page { padding: 18px 22px; max-width: 1720px; margin: 0 auto; }
.sh { font-family:var(--font-c);font-size:.7rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px; }
.sh::after { content:'';flex:1;height:1px;background:var(--border); }

.kpis { display:grid;grid-template-columns:repeat(auto-fit, minmax(140px, 1fr));gap:10px;margin-bottom:18px; }
.kpi { background:var(--panel);border:1px solid var(--border);border-radius:11px;padding:14px 16px;position:relative; }
.kpi-bar { position:absolute;left:0;top:0;bottom:0;width:4px; }
.kpi-lbl { font-size:.66rem;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:4px; }
.kpi-val { font-family:var(--font-d);font-size:2.2rem;line-height:1; }
.kpi-sub { font-size:.7rem;color:var(--muted);margin-top:3px; }

.k-blue .kpi-bar{background:var(--blue)} .k-blue .kpi-val{color:var(--blue)}
.k-green .kpi-bar{background:var(--green)} .k-green .kpi-val{color:var(--green)}
.k-red .kpi-bar{background:var(--red)} .k-red .kpi-val{color:var(--red)}

.panel { background:var(--panel);border:1px solid var(--border);border-radius:11px;padding:16px;margin-bottom:14px; }
.ptitle { font-family:var(--font-c);font-size:.72rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px; }

table { width:100%;border-collapse:collapse; }
th { font-size:.63rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);text-align:left;padding:6px 8px;border-bottom:2px solid var(--border); }
td { padding:9px 8px;font-size:.8rem;border-bottom:1px solid var(--border); }
tbody tr:hover td { background:var(--panel2); }

.loading { text-align:center;padding:40px;color:var(--muted); }
.error { background:var(--red-l);border:1px solid var(--red);color:var(--red);padding:16px;border-radius:8px;margin:16px 0; }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">AIRBUS <em>LOGISTICS</em></div>
  <div class="live">● LIVE</div>
  <div class="clock" id="clock"></div>
</div>

<div class="page">

  <div class="sh">📊 Indicateurs du jour</div>
  <div class="kpis" id="kpis">
    <div class="kpi k-blue"><div class="kpi-bar"></div><div class="kpi-lbl">Présents</div><div class="kpi-val" id="kpi-presens">—</div></div>
    <div class="kpi k-red"><div class="kpi-bar"></div><div class="kpi-lbl">Absents</div><div class="kpi-val" id="kpi-absents">—</div></div>
    <div class="kpi k-green"><div class="kpi-bar"></div><div class="kpi-lbl">RDV Airbus</div><div class="kpi-val" id="kpi-rdv">—</div></div>
  </div>

  <div class="panel">
    <div class="ptitle">📅 RDV Airbus — Aujourd'hui & Demain</div>
    <div id="rdv-container" class="loading">Chargement...</div>
  </div>

  <div class="panel">
    <div class="ptitle">👥 Présence équipe</div>
    <div id="presence-container" class="loading">Chargement...</div>
  </div>

</div>

<script>
// CONFIG
const GOOGLE_SHEETS_ABSENCE = '1DuJiNC109RGAMu90YbB6huiRvpVih9Sn';
const GOOGLE_SHEETS_AIRBUS_RDV = '1zkCanTEF-JLgKEmvj1GIl5nbtyQnqNJajkK_3Riyqok';

// Update clock
setInterval(() => {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('fr-FR');
}, 1000);

// Load data
async function loadData() {
  try {
    // Load absence/presence
    const absenceUrl = `https://docs.google.com/spreadsheets/d/${GOOGLE_SHEETS_ABSENCE}/export?format=csv`;
    const absenceRes = await fetch(absenceUrl);
    const absenceText = await absenceRes.text();
    
    // Load RDV Airbus
    const rdvUrl = `https://docs.google.com/spreadsheets/d/${GOOGLE_SHEETS_AIRBUS_RDV}/export?format=csv`;
    const rdvRes = await fetch(rdvUrl);
    const rdvText = await rdvRes.text();
    
    // Parse and render
    renderPresence(parseCSV(absenceText));
    renderRDV(parseCSV(rdvText));
    
  } catch(e) {
    document.getElementById('rdv-container').innerHTML = `<div class="error">❌ Erreur de chargement : ${e.message}</div>`;
    document.getElementById('presence-container').innerHTML = `<div class="error">❌ Erreur de chargement : ${e.message}</div>`;
  }
}

function parseCSV(text) {
  const lines = text.split('\n');
  const data = [];
  for(let line of lines) {
    if(line.trim()) data.push(line.split(','));
  }
  return data;
}

function renderPresence(data) {
  const today = new Date().toLocaleDateString('fr-FR');
  let html = `<p style="font-size:.85rem;color:var(--muted);margin-bottom:12px;">📅 ${today}</p>`;
  html += '<table><tr><th>Nom</th><th>Status</th></tr>';
  
  let presents = 0, absents = 0;
  
  // Exemple de structure attendue
  data.forEach((row, i) => {
    if(i > 0 && row[0]) {
      const status = row[1] ? (row[1].includes('A') ? 'Absent' : 'Présent') : 'Présent';
      if(status === 'Présent') presents++;
      else absents++;
      
      html += `<tr><td>${row[0]}</td><td><span style="font-size:.7rem;font-weight:700;padding:3px 8px;border-radius:4px;${status === 'Présent' ? 'background:var(--green-l);color:var(--green)' : 'background:var(--red-l);color:var(--red)'}">${status}</span></td></tr>`;
    }
  });
  
  html += '</table>';
  
  document.getElementById('presence-container').innerHTML = html;
  document.getElementById('kpi-presens').textContent = presents;
  document.getElementById('kpi-absents').textContent = absents;
}

function renderRDV(data) {
  let html = '<table><tr><th>Date</th><th>Lieu</th><th>Demandeur</th><th>Statut</th></tr>';
  
  let rdvCount = 0;
  const today = new Date();
  today.setHours(0,0,0,0);
  
  data.forEach((row, i) => {
    if(i > 0 && row[0]) {
      // Exemple simple - adapter selon ta structure réelle
      if(row[4] && row[4].includes('AIRBUS')) {
        rdvCount++;
        html += `<tr><td>${row[0]}</td><td>${row[3] || '—'}</td><td>${row[2] || '—'}</td><td><span style="font-size:.7rem;background:var(--blue-l);color:var(--blue);padding:3px 8px;border-radius:4px">${row[5] || 'En attente'}</span></td></tr>`;
      }
    }
  });
  
  if(rdvCount === 0) {
    html = '<p style="text-align:center;padding:20px;color:var(--muted)">✅ Aucun RDV</p>';
  }
  
  document.getElementById('rdv-container').innerHTML = html;
  document.getElementById('kpi-rdv').textContent = rdvCount;
}

// Init
loadData();
setInterval(loadData, 300000); // Refresh every 5 minutes
</script>

</body>
</html>
